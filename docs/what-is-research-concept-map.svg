<svg viewBox="0 0 1680 1200" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
  <title id="title">What is Research? Concept Map</title>
  <desc id="desc">Concept map with linking phrases showing research as question-driven, theory-grounded, ethically situated, methodologically designed, evidence-generating, integrated, and practice-oriented.</desc>
  <defs>
    <style>
      .node rect{fill:#fff;stroke:#c7d0d5;stroke-width:1.5;rx:10}.node text{fill:#17212b;font:650 18px Aptos,Segoe UI,Arial,sans-serif}.node .small{font:500 15px Aptos,Segoe UI,Arial,sans-serif;fill:#52616f}.core rect{fill:#26364a;stroke:#142032}.core text{fill:#fffef8;font:750 24px Aptos,Segoe UI,Arial,sans-serif}.branch rect{fill:#edf5f2;stroke:#9ebcb5}.warm rect{fill:#fff6e8;stroke:#dfbf8f}.link{fill:none;stroke:#5f8f8b;stroke-width:2.8;marker-end:url(#arrow)}.cross-link{fill:none;stroke:#b17d48;stroke-width:2.2;stroke-dasharray:7 8;marker-end:url(#arrowWarm)}.phrase rect{fill:#fffef8;stroke:#ded6bf;stroke-width:1;rx:12}.phrase text{fill:#34424e;font:650 13px Aptos,Segoe UI,Arial,sans-serif}.note{font:14px Aptos,Segoe UI,Arial,sans-serif;fill:#4f5d66}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#5f8f8b"/></marker>
    <marker id="arrowWarm" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#b17d48"/></marker>
  </defs>
  <rect x="0" y="0" width="1680" height="1200" fill="#fbfaf7"/>
  <text x="54" y="54" class="note">Focus question: What is Research?</text>
  <text x="54" y="78" class="note">Linking phrases are placed on the connector lines.</text>
  <g class="node core" transform="translate(632 506)"><rect width="416" height="142"/><text x="208" y="54" text-anchor="middle">Research</text><text x="208" y="88" text-anchor="middle">is disciplined inquiry</text><text x="208" y="116" text-anchor="middle">for understanding and action</text></g>
  <g class="node branch" transform="translate(98 134)"><rect width="330" height="96"/><text x="165" y="39" text-anchor="middle">Begins With a Problem</text><text class="small" x="165" y="67" text-anchor="middle">a gap worth investigating</text></g>
  <g class="node" transform="translate(54 282)"><rect width="390" height="92"/><text x="195" y="36" text-anchor="middle">GenAI Changes Learning Conditions</text><text class="small" x="195" y="64" text-anchor="middle">teaching, authorship, cognition, policy</text></g>
  <g class="node" transform="translate(92 432)"><rect width="330" height="92"/><text x="165" y="36" text-anchor="middle">Research Questions</text><text class="small" x="165" y="64" text-anchor="middle">turn concern into inquiry</text></g>
  <g class="node branch" transform="translate(1124 88)"><rect width="330" height="96"/><text x="165" y="39" text-anchor="middle">Is Grounded in Theory</text><text class="small" x="165" y="67" text-anchor="middle">concepts shape what can be seen</text></g>
  <g class="node" transform="translate(1096 236)"><rect width="386" height="92"/><text x="193" y="36" text-anchor="middle">Media Ecology</text><text class="small" x="193" y="64" text-anchor="middle">Ong, consciousness, symbolic environments</text></g>
  <g class="node" transform="translate(1084 384)"><rect width="410" height="92"/><text x="205" y="36" text-anchor="middle">Tertiary Algorithmicity</text><text class="small" x="205" y="64" text-anchor="middle">algorithms curate and generate discourse</text></g>
  <g class="node" transform="translate(1090 532)"><rect width="398" height="92"/><text x="199" y="36" text-anchor="middle">Pedagogical Friction</text><text class="small" x="199" y="64" text-anchor="middle">productive resistance worth preserving</text></g>
  <g class="node branch warm" transform="translate(78 656)"><rect width="352" height="96"/><text x="176" y="39" text-anchor="middle">Is Ethically Situated</text><text class="small" x="176" y="67" text-anchor="middle">the researcher is never outside the work</text></g>
  <g class="node warm" transform="translate(54 812)"><rect width="390" height="96"/><text x="195" y="38" text-anchor="middle">Positionality</text><text class="small" x="195" y="66" text-anchor="middle">practitioner-scholar, technoskeptical lens</text></g>
  <g class="node warm" transform="translate(78 966)"><rect width="352" height="96"/><text x="176" y="38" text-anchor="middle">Power and Protections</text><text class="small" x="176" y="66" text-anchor="middle">voluntary, confidential, outside supervision</text></g>
  <g class="node branch" transform="translate(1126 700)"><rect width="330" height="96"/><text x="165" y="39" text-anchor="middle">Uses Methods as Tools</text><text class="small" x="165" y="67" text-anchor="middle">questions drive design choices</text></g>
  <g class="node" transform="translate(1096 850)"><rect width="386" height="92"/><text x="193" y="36" text-anchor="middle">Convergent Mixed Methods</text><text class="small" x="193" y="64" text-anchor="middle">QUAL + quan, analyzed then integrated</text></g>
  <g class="node" transform="translate(1084 996)"><rect width="410" height="92"/><text x="205" y="36" text-anchor="middle">Collective Instrumental Case Study</text><text class="small" x="205" y="64" text-anchor="middle">multiple cases illuminate one phenomenon</text></g>
  <g class="node branch" transform="translate(572 84)"><rect width="536" height="96"/><text x="268" y="39" text-anchor="middle">Generates Evidence Through Data</text><text class="small" x="268" y="67" text-anchor="middle">evidence is gathered from more than one angle</text></g>
  <g class="node" transform="translate(542 232)"><rect width="286" height="96"/><text x="143" y="38" text-anchor="middle">Qualitative Data</text><text class="small" x="143" y="66" text-anchor="middle">interviews, card sorts, documents</text></g>
  <g class="node" transform="translate(852 232)"><rect width="286" height="96"/><text x="143" y="38" text-anchor="middle">Quantitative Data</text><text class="small" x="143" y="66" text-anchor="middle">surveys, secondary datasets</text></g>
  <g class="node" transform="translate(696 354)"><rect width="288" height="88"/><text x="144" y="35" text-anchor="middle">AI Discourse Comparison</text><text class="small" x="144" y="62" text-anchor="middle">tests claims about synthetic reasoning</text></g>
  <g class="node branch" transform="translate(572 812)"><rect width="536" height="96"/><text x="268" y="39" text-anchor="middle">Produces Interpretation</text><text class="small" x="268" y="67" text-anchor="middle">analysis turns data into warranted claims</text></g>
  <g class="node" transform="translate(532 980)"><rect width="300" height="96"/><text x="150" y="38" text-anchor="middle">Separate Analyses</text><text class="small" x="150" y="66" text-anchor="middle">thematic coding, descriptive patterns</text></g>
  <g class="node" transform="translate(862 980)"><rect width="300" height="96"/><text x="150" y="38" text-anchor="middle">Integration</text><text class="small" x="150" y="66" text-anchor="middle">joint displays and meta-inferences</text></g>
  <g class="node branch warm" transform="translate(594 672)"><rect width="492" height="96"/><text x="246" y="39" text-anchor="middle">Contributes to Educational Practice</text><text class="small" x="246" y="67" text-anchor="middle">research should clarify decisions, not only describe them</text></g>
  <g class="node warm" transform="translate(516 1108)"><rect width="314" height="72"/><text x="157" y="43" text-anchor="middle">AI Policy Guidance</text></g>
  <g class="node warm" transform="translate(852 1108)"><rect width="314" height="72"/><text x="157" y="43" text-anchor="middle">Assessment Redesign</text></g>
