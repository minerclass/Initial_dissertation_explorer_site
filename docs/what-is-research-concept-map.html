<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>What is Research? Concept Map</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17212b;
      --muted: #52616f;
      --paper: #f7f4ee;
      --line: #5f8f8b;
      --line-2: #b17d48;
      --core: #26364a;
      --node: #ffffff;
      --node-alt: #edf5f2;
      --node-warm: #fff6e8;
      --phrase: #fffef8;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Aptos", "Segoe UI", Arial, sans-serif;
    }

    main {
      max-width: 1720px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      margin: 0 0 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 2.4vw, 2.8rem);
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 980px;
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .map-frame {
      overflow: auto;
      border: 1px solid #d9d2c6;
      background: #fbfaf7;
      box-shadow: 0 18px 45px rgba(23, 33, 43, 0.12);
    }

    svg {
      display: block;
      min-width: 1540px;
      width: 100%;
      height: auto;
    }

    .node rect {
      fill: var(--node);
      stroke: #c7d0d5;
      stroke-width: 1.5;
      rx: 10;
    }

    .node text {
      fill: var(--ink);
      font-size: 18px;
      font-weight: 650;
    }

    .node .small {
      font-size: 15px;
      font-weight: 500;
      fill: var(--muted);
    }

    .core rect {
      fill: var(--core);
      stroke: #142032;
    }

    .core text {
      fill: #fffef8;
      font-size: 24px;
      font-weight: 750;
    }

    .branch rect {
      fill: var(--node-alt);
      stroke: #9ebcb5;
    }

    .warm rect {
      fill: var(--node-warm);
      stroke: #dfbf8f;
    }

    .link {
      fill: none;
      stroke: var(--line);
      stroke-width: 2.8;
      marker-end: url(#arrow);
    }

    .cross-link {
      fill: none;
      stroke: var(--line-2);
      stroke-width: 2.2;
      stroke-dasharray: 7 8;
      marker-end: url(#arrowWarm);
    }

    .phrase rect {
      fill: var(--phrase);
      stroke: #ded6bf;
      stroke-width: 1;
      rx: 12;
    }

    .phrase text {
      fill: #34424e;
      font-size: 13px;
      font-weight: 650;
    }

    .note {
      font-size: 14px;
      fill: #4f5d66;
    }

    @media print {
      main {
        max-width: none;
        padding: 0;
      }

      header {
        display: none;
      }

      .map-frame {
        border: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
